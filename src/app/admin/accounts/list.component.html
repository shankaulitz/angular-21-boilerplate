<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="fw-bold text-primary mb-1">User Management</h2>
        <p class="text-muted small mb-0">Manage all registered accounts and their roles.</p>
    </div>
    <a routerLink="add" class="btn btn-primary shadow-sm">
        <i class="bi bi-person-plus-fill me-2"></i>Create New Account
    </a>
</div>

<div class="card shadow-sm border-0">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead class="bg-light">
                <tr>
                    <th class="px-4 py-3 text-secondary small text-uppercase fw-bold" style="width:35%">Name</th>
                    <th class="py-3 text-secondary small text-uppercase fw-bold" style="width:35%">Email</th>
                    <th class="py-3 text-secondary small text-uppercase fw-bold" style="width:20%">Role</th>
                    <th class="px-4 py-3" style="width:10%"></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let account of accounts" class="align-middle">
                    <td class="px-4 py-3 fw-medium">
                        {{account.title}} {{account.firstName}} {{account.lastName}}
                    </td>
                    <td class="py-3 text-muted">
                        {{account.email}}
                    </td>
                    <td class="py-3">
                        <span class="badge rounded-pill" 
                              [ngClass]="account.role === 'Admin' ? 'bg-primary text-white' : 'bg-light text-dark border'">
                            {{account.role}}
                        </span>
                    </td>
                    <td class="px-4 py-3 text-end">
                        <a routerLink="edit/{{account.id}}" class="btn btn-sm btn-outline-primary me-2">
                            Edit
                        </a>
                        <button (click)="deleteAccount(account.id)" 
                                class="btn btn-sm btn-outline-danger" 
                                [disabled]="account.isDeleting">
                            <span *ngIf="account.isDeleting" class="spinner-border spinner-border-sm"></span>
                            <span *ngIf="!account.isDeleting">Delete</span>
                        </button>
                    </td>
                </tr>

                <tr *ngIf="loading">
                    <td colspan="4" class="text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </td>
                </tr>

                <tr *ngIf="!loading && accounts.length === 0">
                    <td colspan="4" class="text-center py-5 text-muted">
                        No accounts found in the system.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
