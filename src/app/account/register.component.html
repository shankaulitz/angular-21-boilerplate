<div class="card-header py-3 bg-white border-bottom">
    <h4 class="mb-0 fw-bold text-center text-primary">Create Your Account</h4>
</div>

<div class="card-body p-4">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="row">
            <div class="mb-3 col-md-2">
                <label class="form-label">Title</label>
                <select
                    formControlName="title"
                    class="form-select shadow-sm"
                    [ngClass]="{ 'is-invalid': submitted && f.title.errors }"
                >
                    <option value=""></option>
                    <option value="Mr">Mr</option>
                    <option value="Mrs">Mrs</option>
                    <option value="Miss">Miss</option>
                    <option value="Ms">Ms</option>
                </select>
                <div *ngIf="submitted && f.title.errors" class="invalid-feedback">
                    Required
                </div>
            </div>

            <div class="mb-3 col-md-5">
                <label class="form-label">First Name</label>
                <input
                    type="text"
                    formControlName="firstName"
                    class="form-control shadow-sm"
                    placeholder="First Name"
                    [ngClass]="{ 'is-invalid': submitted && f.firstName.errors }"
                />
                <div *ngIf="submitted && f.firstName.errors" class="invalid-feedback">
                    First Name is required
                </div>
            </div>

            <div class="mb-3 col-md-5">
                <label class="form-label">Last Name</label>
                <input
                    type="text"
                    formControlName="lastName"
                    class="form-control shadow-sm"
                    placeholder="Last Name"
                    [ngClass]="{ 'is-invalid': submitted && f.lastName.errors }"
                />
                <div *ngIf="submitted && f.lastName.errors" class="invalid-feedback">
                    Last Name is required
                </div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input
                type="text"
                formControlName="email"
                class="form-control shadow-sm"
                placeholder="email@example.com"
                [ngClass]="{ 'is-invalid': submitted && f.email.errors }"
            />
            <div *ngIf="submitted && f.email.errors" class="invalid-feedback">
                <div *ngIf="f.email.errors.required">Email is required</div>
                <div *ngIf="f.email.errors.email">Invalid email format</div>
            </div>
        </div>

        <div class="row">
            <div class="mb-3 col-md-6">
                <label class="form-label">Password</label>
                <input
                    type="password"
                    formControlName="password"
                    class="form-control shadow-sm"
                    placeholder="Min 6 characters"
                    [ngClass]="{ 'is-invalid': submitted && f.password.errors }"
                />
                <div *ngIf="submitted && f.password.errors" class="invalid-feedback">
                    <div *ngIf="f.password.errors.required">Required</div>
                    <div *ngIf="f.password.errors.minlength">Too short</div>
                </div>
            </div>

            <div class="mb-3 col-md-6">
                <label class="form-label">Confirm Password</label>
                <input
                    type="password"
                    formControlName="confirmPassword"
                    class="form-control shadow-sm"
                    placeholder="Confirm password"
                    [ngClass]="{ 'is-invalid': submitted && f.confirmPassword.errors }"
                />
                <div *ngIf="submitted && f.confirmPassword.errors" class="invalid-feedback">
                    <div *ngIf="f.confirmPassword.errors.required">Required</div>
                    <div *ngIf="f.confirmPassword.errors.mustMatch">Mismatch</div>
                </div>
            </div>
        </div>

        <div class="mb-4 form-check">
            <input
                type="checkbox"
                formControlName="acceptTerms"
                id="acceptTerms"
                class="form-check-input"
                [ngClass]="{ 'is-invalid': submitted && f.acceptTerms.errors }"
            />
            <label for="acceptTerms" class="form-check-label small text-muted">
                I agree to the Terms & Conditions
            </label>
            <div *ngIf="submitted && f.acceptTerms.errors" class="invalid-feedback">
                You must accept the terms
            </div>
        </div>

        <div class="d-grid gap-2">
            <button [disabled]="submitting" class="btn btn-primary btn-lg shadow-sm">
                <span
                    *ngIf="submitting"
                    class="spinner-border spinner-border-sm me-2"
                ></span>
                Create Account
            </button>
        </div>

        <div class="mt-4 text-center">
            <p class="text-muted small mb-0">Already have an account? 
                <a routerLink="../login" class="text-primary text-decoration-none fw-bold">Sign In</a>
            </p>
        </div>
    </form>
</div>
